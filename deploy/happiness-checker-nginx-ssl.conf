# Nginx for happiness-checker.com + reverse proxy to Jenkins on shared Docker network.
# Live path on VPS (example): /root/happyness/nginx-ssl.conf
# Requires: docker network connect happiness-network jenkins
#
# Note: /api/ stays routed to the AI agent. Must proxy /j_spring_security_check (Jenkins login POST) or nginx returns 405 from SPA try_files.
# Root /api/* cannot go to both backends; full Jenkins UI edge cases may need ci.* subdomain.

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    upstream jenkins_upstream {
        server jenkins:8080;
    }

    server {
        listen 80;
        server_name happiness-checker.com www.happiness-checker.com;
        return 301 https://$server_name$request_uri;
    }

    # Dedicated Jenkins host to avoid route conflicts with the main app.
    server {
        listen 80;
        server_name ci.happiness-checker.com;
        return 301 https://$server_name$request_uri;
    }

    # NOTE: Replace certificate with one that includes ci.happiness-checker.com.
    # Current certificate path may serve a name mismatch until cert is re-issued.
    server {
        listen 443 ssl http2;
        server_name ci.happiness-checker.com;

        ssl_certificate /etc/letsencrypt/live/happiness-checker.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/happiness-checker.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location / {
            proxy_pass http://jenkins_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 900s;
            proxy_redirect off;
        }
    }

    server {
        listen 443 ssl http2;
        server_name happiness-checker.com www.happiness-checker.com;
        root /usr/share/nginx/html;
        index index.html;

        ssl_certificate /etc/letsencrypt/live/happiness-checker.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/happiness-checker.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location /api/ {
            proxy_pass http://aiagent:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Jenkins login form POST (relative action from /login page)
        location ^~ /j_spring_security_check {
            proxy_pass http://jenkins_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_http_version 1.1;
            proxy_read_timeout 900s;
            proxy_redirect off;
        }

        # Jenkins (hostname "jenkins" on happiness-network). Use ^~ /job/ so /jobs does not match "job".
        location ^~ /job/ {
            proxy_pass http://jenkins_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 900s;
            proxy_redirect off;
        }

        location ~ ^/(view|user|computer|queue|crumbIssuer|login|logout|manage|static|assets|adjuncts|ajaxExecutors|pluginManager|updateCenter|systemInfo|securityRealm|credentials|descriptorByName|whoAmI|cli|restart|safeRestart|github-webhook)(/.*)?$ {
            proxy_pass http://jenkins_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 900s;
            proxy_redirect off;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
