# Jenkins LTS on a single VPS (controller runs jobs on the same container by default).
# Start: docker compose up -d
# See README.md for first-login and GitHub integration.

services:
  jenkins:
    # Jenkins 2.555.1+ LTS requires Java 21+ on controller; jdk17 images are retired.
    image: jenkins/jenkins:lts-jdk21
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "${JENKINS_HTTP_PORT:-8080}:8080"
      - "${JENKINS_AGENT_PORT:-50000}:50000"
    environment:
      TZ: ${TZ:-Europe/Copenhagen}
      # Serve Jenkins UI/API under https://<host>/jenkins
      JENKINS_OPTS: "--prefix=/jenkins"
      # Skip setup wizard only if you know what you're doing (not recommended for first install):
      # JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
    volumes:
      - jenkins_home:/var/jenkins_home
      # Required for Pipeline jobs using `agent { docker { ... } }` (e.g. datafordeler_regnskab).
      # Install CLI in container: docker-compose exec -u root jenkins bash -lc 'apt-get update && apt-get install -y docker.io'
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  jenkins_home:
    name: slothanalytics_jenkins_home
